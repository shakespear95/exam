<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Critical Thinking Flashcards</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --card: #1e2030;
    --accent: #6c8ef5;
    --accent2: #4ade80;
    --wrong: #f87171;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #2d3148;
    --tip: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px 16px 32px; gap: 0; }

  /* Header */
  header { width: 100%; max-width: 620px; display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 14px; }
  h1 { font-size: 1.05rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; }
  .progress-wrap { width: 100%; background: var(--border); border-radius: 99px; height: 5px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .counter { font-size: 0.78rem; color: var(--muted); }
  .stats-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .stat-badge { padding: 3px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; }
  .stat-badge.s-correct { background: rgba(74,222,128,0.13); color: var(--accent2); }
  .stat-badge.s-incorrect { background: rgba(248,113,113,0.13); color: var(--wrong); }
  .stat-badge.s-hard { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
  .stat-badge.s-easy { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }

  /* Card */
  .card-area { width: 100%; max-width: 620px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }

  .card-header { display: flex; align-items: center; justify-content: space-between; }
  .card-meta { font-size: 0.7rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px; }
  .card-num { color: var(--accent); }
  .multi-badge { background: rgba(108,142,245,0.18); color: var(--accent); padding: 2px 7px; border-radius: 4px; font-size: 0.63rem; }
  .mem-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; }
  .mem-badge.hard { background: rgba(248,113,113,0.18); color: #f87171; }
  .mem-badge.easy { background: rgba(74,222,128,0.18); color: #4ade80; }

  .question-text { font-size: 0.96rem; line-height: 1.68; font-weight: 500; }

  /* Options */
  .options-list { display: flex; flex-direction: column; gap: 7px; }
  .option-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 13px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s; user-select: none; }
  .option-item:hover { border-color: rgba(108,142,245,0.5); background: rgba(108,142,245,0.05); }
  .option-item.selected { border-color: var(--accent); background: rgba(108,142,245,0.11); }
  .option-item input { width: 15px; height: 15px; flex-shrink: 0; margin-top: 2px; accent-color: var(--accent); cursor: pointer; }
  .opt-text { font-size: 0.875rem; line-height: 1.5; }

  .btn-submit { width: 100%; padding: 13px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #8b5cf6); color: white; font-size: 0.93rem; font-weight: 700; cursor: pointer; transition: box-shadow 0.2s, transform 0.15s; margin-top: 2px; }
  .btn-submit:hover { box-shadow: 0 4px 18px rgba(108,142,245,0.38); }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit.warn { background: linear-gradient(135deg, #f59e0b, #d97706); }

  /* Results */
  .results-area { display: none; flex-direction: column; gap: 12px; }
  .results-area.visible { display: flex; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }

  .result-banner { padding: 10px 14px; border-radius: 10px; font-weight: 700; font-size: 0.88rem; display: flex; align-items: center; gap: 8px; }
  .result-banner.r-correct { background: rgba(74,222,128,0.14); color: var(--accent2); border: 1px solid rgba(74,222,128,0.3); }
  .result-banner.r-partial { background: rgba(251,191,36,0.1); color: var(--tip); border: 1px solid rgba(251,191,36,0.28); }
  .result-banner.r-wrong { background: rgba(248,113,113,0.11); color: var(--wrong); border: 1px solid rgba(248,113,113,0.28); }

  .result-opts { display: flex; flex-direction: column; gap: 5px; }
  .result-opt { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; border-radius: 9px; font-size: 0.865rem; line-height: 1.5; }
  .result-opt .ri { width: 16px; flex-shrink: 0; font-style: normal; margin-top: 1px; text-align: center; font-size: 0.85rem; }
  .ro-correct-hit { background: rgba(74,222,128,0.13); color: var(--accent2); }
  .ro-correct-miss { background: rgba(74,222,128,0.05); border: 1px dashed rgba(74,222,128,0.35); }
  .ro-correct-miss .ri, .ro-correct-miss .ro-text { color: var(--accent2); opacity: 0.75; }
  .ro-wrong-hit { background: rgba(248,113,113,0.12); color: var(--wrong); }
  .ro-wrong-miss { opacity: 0.38; }

  .tip-box { background: rgba(251,191,36,0.07); border-left: 3px solid var(--tip); border-radius: 0 8px 8px 0; padding: 9px 12px; font-size: 0.79rem; color: var(--tip); line-height: 1.55; }

  /* Nav */
  .nav { width: 100%; max-width: 620px; display: flex; gap: 10px; margin-top: 12px; }
  .btn { border: none; border-radius: 11px; font-size: 0.86rem; font-weight: 600; cursor: pointer; padding: 11px 18px; transition: all 0.18s; }
  .btn:active { transform: scale(0.96); }
  .btn-nav { background: var(--surface); color: var(--text); border: 1px solid var(--border); flex: 1; }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-nav:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }

  /* Memory buttons */
  .mem-row { width: 100%; max-width: 620px; display: flex; gap: 10px; margin-top: 10px; }
  .mem-row.hidden { display: none; }
  .btn-hard { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.3); flex: 1; border-radius: 11px; font-size: 0.86rem; font-weight: 600; padding: 11px; cursor: pointer; transition: all 0.18s; }
  .btn-hard:hover { background: rgba(248,113,113,0.2); }
  .btn-hard.active { background: rgba(248,113,113,0.28); border-color: #f87171; box-shadow: 0 0 0 1px #f87171; }
  .btn-easy { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); flex: 1; border-radius: 11px; font-size: 0.86rem; font-weight: 600; padding: 11px; cursor: pointer; transition: all 0.18s; }
  .btn-easy:hover { background: rgba(74,222,128,0.2); }
  .btn-easy.active { background: rgba(74,222,128,0.28); border-color: #4ade80; box-shadow: 0 0 0 1px #4ade80; }

  /* Toolbar */
  .toolbar { width: 100%; max-width: 620px; display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .btn-tool { background: var(--surface); color: var(--muted); border: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; flex: 1; padding: 8px 5px; border-radius: 9px; cursor: pointer; min-width: 56px; transition: all 0.15s; }
  .btn-tool:hover { color: var(--text); border-color: rgba(108,142,245,0.5); }
  .btn-tool.active { background: rgba(108,142,245,0.13); color: var(--accent); border-color: var(--accent); }

  /* Summary */
  .summary { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 20px; text-align: center; max-width: 620px; width: 100%; }
  .summary h2 { font-size: 1.4rem; color: var(--accent2); }
  .summary .big-score { font-size: 3.8rem; font-weight: 800; line-height: 1; }
  .summary .sub { color: var(--muted); font-size: 0.88rem; }
  .sum-mem-row { display: flex; gap: 12px; }
  .btn-restart { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: white; padding: 14px 36px; border-radius: 14px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 6px; }
  .btn-restart:hover { box-shadow: 0 4px 18px rgba(108,142,245,0.38); }

  .hint { font-size: 0.7rem; color: var(--muted); text-align: center; margin-top: 8px; opacity: 0.6; }
</style>
</head>
<body>

<header>
  <h1>Critical Thinking Flashcards</h1>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="counter" id="counter">Card 1 of 97</div>
  <div class="stats-row">
    <div class="stat-badge s-correct" id="correctCount">Correct: 0</div>
    <div class="stat-badge s-incorrect" id="incorrectCount">Incorrect: 0</div>
    <div class="stat-badge s-hard" id="hardCount">Hard: 0</div>
    <div class="stat-badge s-easy" id="easyCount">Easy: 0</div>
  </div>
</header>

<div class="card-area" id="cardArea">
  <div class="card" id="card">
    <div id="questionSide">
      <div class="card-header">
        <div class="card-meta" id="cardMeta">Question <span class="card-num">#1</span></div>
        <div id="memBadge"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="options-list" id="optionsList"></div>
      <button class="btn-submit" id="btnSubmit" onclick="submitAnswer()">Submit Answer</button>
    </div>
    <div class="results-area" id="resultsArea">
      <div class="result-banner" id="resultBanner"></div>
      <div class="result-opts" id="resultOpts"></div>
      <div class="tip-box" id="tipBox"></div>
    </div>
  </div>
</div>

<div class="nav" id="navRow">
  <button class="btn btn-nav" id="btnPrev" onclick="prevCard()">&#8592; Prev</button>
  <button class="btn btn-nav" id="btnNext" onclick="nextCard()">Next &#8594;</button>
</div>

<div class="mem-row hidden" id="memRow">
  <button class="btn-hard" id="btnHard" onclick="setMemory('hard')">&#128308; Hard — need to review</button>
  <button class="btn-easy" id="btnEasy" onclick="setMemory('easy')">&#128994; Easy — got it!</button>
</div>

<div class="toolbar" id="toolbar">
  <button class="btn-tool active" id="fAll" onclick="setFilter('all')">All (97)</button>
  <button class="btn-tool" id="fHard" onclick="setFilter('hard')">&#128308; Hard</button>
  <button class="btn-tool" id="fEasy" onclick="setFilter('easy')">&#128994; Easy</button>
  <button class="btn-tool" id="fNew" onclick="setFilter('new')">New</button>
  <button class="btn-tool" onclick="shuffleDeck()">Shuffle</button>
  <button class="btn-tool" onclick="resetAll()">Reset</button>
</div>

<p class="hint" id="kbHint">Enter = submit &nbsp;|&nbsp; H = hard &nbsp;|&nbsp; E = easy &nbsp;|&nbsp; &#8592;&#8594; navigate</p>

<div class="summary" id="summary">
  <h2>Session Complete!</h2>
  <div class="big-score" id="sumScore"></div>
  <div class="sub" id="sumSub"></div>
  <div class="sum-mem-row">
    <div class="stat-badge s-hard" id="sumHard"></div>
    <div class="stat-badge s-easy" id="sumEasy"></div>
  </div>
  <button class="btn-restart" onclick="resetAll()">Start Over</button>
</div>

<script>
const CARDS = [
  { id:1, multi:true, q:"Select ALL that correctly describe the role of qualifiers in academic arguments.", correct:["Help acknowledge exceptions in claims","Limit the scope of a claim, ensuring precision"], wrong:["Act as the primary evidence supporting an argument","Increase the degree of certainty about claims","Eliminate any doubts about the claim's validity"], tip:"Qualifiers (usually, often, in most cases) REDUCE certainty — they hedge claims, not strengthen them." },
  { id:2, multi:false, q:"Which technique can guide problem-solving effectively by utilizing the Flipped Interaction Pattern in AI models?", correct:["Model asks questions to stimulate thought"], wrong:["Model remains passive until prompted","Model provides answers exclusively","Model generates random questions"], tip:"In the Flipped Interaction Pattern, the AI drives the conversation by asking questions to guide the user's thinking." },
  { id:3, multi:false, q:"What is the primary purpose of brainstorming in the creative process?", correct:["Generate multiple ideas without judgment"], wrong:["Critique ideas as they are generated","Select the best idea from a list","Focus on a single solution"], tip:"Brainstorming = quantity over quality, suspend judgment, defer evaluation." },
  { id:4, multi:false, q:"Which of the following definitions best describes innovation?", correct:["The process of translating ideas into goods or services that create value."], wrong:["Learning from past experiences to avoid future mistakes.","The ability to generate new ideas without any implementation.","Replicating existing products with minor improvements."], tip:"Innovation = idea + implementation + value creation. It requires action, not just thinking." },
  { id:5, multi:false, q:"Which of the following techniques is essential for crafting effective few-shot examples with clear instructions and sufficient context in natural language processing?", correct:["Using explicit task definitions"], wrong:["Applying data augmentation","Fine-tuning with large datasets","Implementing dropout layers"], tip:"Few-shot examples work when the task is explicitly defined so the model understands what pattern to follow." },
  { id:6, multi:false, q:"In reflective practices, what is the primary goal when comparing peer marking results?", correct:["To identify discrepancies and enhance assessment accuracy."], wrong:["To validate the overall grading curve used by peers.","To ensure all peer reviews are conducted anonymously.","To standardize marking criteria across different assignments."], tip:"The goal is calibration — finding where you and your peers differ and why." },
  { id:7, multi:true, q:"Select all the components that contribute to the development of critical thinking skills in the context of argumentation.", correct:["Analyzing implications","Evaluating evidence","Questioning assumptions"], wrong:["Following popular opinion","Accepting common beliefs"], tip:"Critical thinking = analysis + evaluation + questioning. Popular opinion and common beliefs are the opposite." },
  { id:8, multi:false, q:"What is an example of a logical argument using different premises? Choose the option that correctly illustrates the use of premises to support a conclusion.", correct:["If it rains, the ground gets wet. It is raining; therefore, the ground is wet."], wrong:["Birds can fly. Penguins are birds; therefore, penguins can fly.","All cats are mammals. Some mammals are dogs; therefore, some dogs are cats.","If the temperature drops, water freezes. Water is frozen; therefore, the temperature dropped."], tip:"Valid Modus Ponens (P\u2192Q, P, \u2234Q). The others contain false premises or the fallacy of affirming the consequent." },
  { id:9, multi:false, q:"Which of the following describes a key benefit of using prompts in large language models?", correct:["Enhances model accuracy by providing context."], wrong:["Reduces computational costs significantly.","Eliminates the need for training data.","Ensures ethical usage of models."], tip:"Context in prompts helps the model understand the specific task, leading to more accurate, relevant responses." },
  { id:10, multi:false, q:"What is a key guideline for effectively completing the summative assessment in the course?", correct:["Understand the assessment criteria thoroughly."], wrong:["Rely on last-minute cramming before the assessment.","Focus solely on memorizing the course content.","Skip sections that seem difficult and focus on easy parts."], tip:"Always know what you're being marked on. Understanding criteria guides what to prioritize." },
  { id:11, multi:true, q:"Identify the effective reflection practices that can lead to enhanced personal and academic growth.", correct:["Journaling about learning experiences and personal insights","Setting specific future goals based on reflection outcomes","Engaging in discussions to explore different perspectives"], wrong:["Ignoring feedback from peers and instructors","Revising only academic material without personal reflection"], tip:"Reflection = looking inward + planning forward + seeking other views." },
  { id:12, multi:false, q:"When developing a plan for your own creativity development, which of the following strategies is most effective for generating new ideas?", correct:["Engaging in brainstorming sessions regularly"], wrong:["Setting rigid rules to guide every creative session","Avoiding collaboration to maintain individual creativity","Focusing solely on areas you are already familiar with"], tip:"Regular brainstorming keeps idea generation active. Rigid rules and isolation stifle creativity." },
  { id:13, multi:false, q:"Reflect on how effective communication can be applied in university studies and beyond. Which of the following strategies is the most effective for ensuring clear communication in academic settings?", correct:["Using precise and clear language to convey complex ideas"], wrong:["Using humor to make communication engaging","Being verbose to cover all possible details","Relying heavily on jargon and technical terms"], tip:"Clarity and precision. Verbosity and unexplained jargon obscure meaning." },
  { id:14, multi:false, q:"Which of the following techniques can be used to introduce new information into a trained language model without altering its existing parameters?", correct:["Prompt engineering"], wrong:["Fine-tuning","Feature extraction","Data augmentation"], tip:"Fine-tuning CHANGES parameters. Prompt engineering adds context at inference time — the model weights stay frozen." },
  { id:15, multi:true, q:"Select the elements that are important for structuring effective prompts for language models:", correct:["Including examples of the expected output","Clarifying the main objective of the task","Defining the desired format of the output"], wrong:["Ignoring previous model interactions","Using overly complex language"], tip:"Good prompts = clear objective + examples + format specification." },
  { id:16, multi:false, q:"What is the primary benefit of combining multiple prompt patterns when solving complex problems?", correct:["Enhanced problem-solving capabilities"], wrong:["Increased creativity","Simplified solutions","Reduced cognitive load"], tip:"Combining patterns (e.g. chain-of-thought + persona + few-shot) tackles complexity from multiple angles." },
  { id:17, multi:false, q:"Which of the following creative strategies is most effective for generating innovative solutions to complex problems?", correct:["Brainstorming with diverse groups"], wrong:["Strict adherence to established methods","Mimicking existing solutions","Focusing solely on technical feasibility"], tip:"Diverse perspectives bring different mental models — diversity drives novelty." },
  { id:18, multi:false, q:"Which of the following techniques can enhance creativity when generating ideas for assignments and improvement?", correct:["Brainstorming sessions"], wrong:["Ignoring feedback from peers","Focusing only on past successful ideas","Strict adherence to rules"], tip:"Brainstorming suspends judgment to generate volume — the foundation for creative output." },
  { id:19, multi:true, q:"Select all methods that directly aid in developing new ideas.", correct:["Mind mapping","Attribute listing","Brainstorming"], wrong:["Budget forecasting","Customer feedback analysis"], tip:"Mind mapping, attribute listing, and brainstorming are classic ideation techniques. Budget forecasting is planning, not ideation." },
  { id:20, multi:false, q:"What is one ethical consideration when using large language models for prompt engineering?", correct:["Bias in generated content"], wrong:["High computational cost","Speed of response generation","Ease of model deployment"], tip:"LLMs inherit biases from training data. This is the core ethical concern — it affects fairness and accuracy." },
  { id:21, multi:false, q:"When considering prompt size limitations in API requests, which strategy is most effective for dealing with large datasets?", correct:["Chunking data into smaller, manageable pieces."], wrong:["Compressing data using lossy methods.","Using dynamic data structures to store larger datasets.","Ignoring surplus data beyond the prompt size limit."], tip:"Chunking splits large data into pieces that fit within the context window, then processes each chunk." },
  { id:22, multi:false, q:"What is the primary goal of employing the tail generation pattern in language models?", correct:["To maintain context by ensuring coherence in the generated text"], wrong:["To increase the speed of text generation","To enhance the ability of models to understand human emotions","To reduce the complexity of language models"], tip:"Tail generation adds prompts at the end to keep the model 'on track' contextually during long generations." },
  { id:23, multi:true, q:"Which of the following practices align with maintaining academic integrity?", correct:["Reporting instances of cheating or plagiarism to authorities.","Properly citing all sources of information used in assignments.","Submitting original work that is your own creation."], wrong:["Copying answers from peers during exams to ensure consistency.","Using unauthorized resources to gain an advantage in assessments."], tip:"Integrity = cite, be original, report misconduct. Copying and unauthorized resources = violations." },
  { id:24, multi:false, q:"Which statement best describes systems thinking in the context of understanding complex situations?", correct:["Systems thinking involves recognizing patterns and understanding how different components of a system interact."], wrong:["Systems thinking is primarily concerned with isolating problems within a system.","Systems thinking focuses on linear cause-and-effect relationships in a system.","Systems thinking prioritizes individual elements over interactions within a system."], tip:"Systems thinking is about INTERACTIONS and PATTERNS, not isolated parts or linear causality." },
  { id:25, multi:true, q:"Which of the following are challenges associated with large language models (LLMs)?", correct:["Unpredictable responses","Complexity in prompt design","Bias in training data"], wrong:["Limited vocabulary usage","Real-time emotion recognition"], tip:"LLMs have vast vocabulary. Emotion recognition is separate. The real challenges are bias, unpredictability, and prompt complexity." },
  { id:26, multi:true, q:"When applying the 'ask for input' pattern to guide large language models, which of the following strategies are effective in achieving this goal?", correct:["Setting specific goals for the output","Including specific examples in the prompt","Defining the context before asking for input"], wrong:["Avoiding any form of feedback loops","Using ambiguous phrasing in the prompt"], tip:"Ask for input works with: specific goals + examples + context. Ambiguity and no feedback = poor results." },
  { id:27, multi:false, q:"As children, creativity often thrives due to certain environmental and psychological factors. Which of the following is most likely to support a child's creative development?", correct:["A playful environment that encourages exploration and experimentation."], wrong:["Highly competitive academic settings focused on standard tests.","Access to advanced technological tools and gadgets.","Strict schedules and defined routines to follow daily."], tip:"Play and exploration = foundational for creativity. Competition, gadgets, and rigid schedules constrain it." },
  { id:28, multi:true, q:"Identify the relevant criteria to evaluate the argument: \"Implementing renewable energy will reduce environmental pollution and contribute to economic growth.\"", correct:["Evidence Quality","Logical Coherence","Relevance"], wrong:["Repetition","Ambiguity","Emotional Appeal"], tip:"Evaluate academic arguments on: Is evidence credible? Does the logic hold? Is it relevant to the claim?" },
  { id:29, multi:true, q:"Which of the following are key components or characteristics of implementing the recipe pattern in problem-solving with language models?", correct:["Provide partial solutions for language models to enhance","Leverage model strengths to complete tasks","Divide problems into manageable parts"], wrong:["Ensure language models operate without any constraints","Focus solely on maximizing model output speed"], tip:"Recipe pattern = give partial ingredients/steps, divide the problem, use the model to fill in and complete." },
  { id:30, multi:false, q:"In the context of creating prompts for teaching complex tasks using few-shot examples, what is an essential aspect to focus on to enhance understanding?", correct:["Decomposing the task into intermediate sub-steps"], wrong:["Using only one comprehensive example","Focusing solely on end results","Avoiding any form of example-based teaching"], tip:"Sub-steps show the reasoning process, not just the answer — this is key for teaching complex tasks." },
  { id:31, multi:true, q:"Select the benefits of using chain of thought prompting in large language models.", correct:["Facilitates better understanding of ambiguous queries through systematic breakdown.","Improves logical reasoning by structuring thoughts in a coherent sequence.","Enhances problem-solving skills by allowing models to focus on individual steps."], wrong:["Increases the randomness of output, making results more diverse.","Reduces the computational resources required for processing queries."], tip:"Chain of Thought = step-by-step reasoning. It improves accuracy and logic, does NOT save compute." },
  { id:32, multi:false, q:"Which of the following is a primary advantage of using template patterns with language models?", correct:["Template patterns allow for consistent output formatting using placeholders."], wrong:["Template patterns improve the accuracy of language models' predictions.","Template patterns increase the processing speed of language models.","Template patterns reduce the need for pre-processing of input data."], tip:"Templates define structure with placeholders — consistency and predictability in output format." },
  { id:33, multi:false, q:"Which type of innovation focuses on improving existing products or services to enhance their value for customers?", correct:["Incremental innovation"], wrong:["Disruptive innovation","Architectural innovation","Radical innovation"], tip:"Incremental = step-by-step improvements. Disruptive = transforms markets. Radical = entirely new. Architectural = reconfigures components." },
  { id:34, multi:true, q:"Select the ways in which creative thinking and innovation are interconnected:", correct:["Creative thinking inspires new ideas that fuel innovation.","Creative thinking challenges the status quo, leading to innovative breakthroughs.","Innovation requires the application of creative thinking to implement new ideas."], wrong:["Creative thinking and innovation are independent processes that do not influence each other.","Innovation mainly demands technical skills rather than creative thinking."], tip:"Innovation doesn't happen without creative thinking — they are deeply interdependent." },
  { id:35, multi:true, q:"Select all components that are essential when using contextual statements to create effective prompts following the Flipped Interaction Pattern.", correct:["Aligning the prompt with the learning objectives to maintain focus.","Incorporating engaging scenarios that relate to real-world applications.","Providing clear background information to enhance understanding."], wrong:["Ensuring prompts are lengthy to cover all possible aspects.","Utilizing complex jargon to challenge learners' comprehension skills."], tip:"Flipped Interaction prompts = aligned objectives + real-world scenarios + clear background. NOT lengthy or jargon-heavy." },
  { id:36, multi:true, q:"Select all prompt patterns that are effective for guiding a model to generate creative solutions to problems.", correct:["Divergent thinking prompts","Brainstorming prompts","Scenario-based prompts"], wrong:["Critique prompts","Convergent thinking prompts"], tip:"Divergent + brainstorming + scenario = open-ended generation. Critique and convergent narrow down, not generate." },
  { id:37, multi:false, q:"When evaluating peer assignments using marking criteria, which aspect is the most important to consider to ensure fairness?", correct:["Consistency with the criteria"], wrong:["Personal opinion about the assignment","Length of the assignment","The number of references used"], tip:"Fair marking = everyone judged by the same standard (the criteria), not by length, references, or personal taste." },
  { id:38, multi:true, q:"Which of the following approaches are effective in iteratively refining prompts for better problem-solving and communication with language models?", correct:["Experimenting with varied language styles in prompts","Incorporating user feedback to enhance the prompt","Analyzing model's previous responses to adjust the prompt"], wrong:["Ignoring unsuccessful prompt attempts","Using prompts that are overly broad or vague"], tip:"Iterative refinement = experiment + feedback loop + analyze results. Ignoring failures and vague prompts block improvement." },
  { id:39, multi:true, q:"Which of the following practices are essential components of critical thinking in academic contexts?", correct:["Analyzing assumptions and biases critically.","Evaluating evidence before forming conclusions.","Engaging in reflective and independent thinking."], wrong:["Accepting information from authoritative sources without question.","Avoiding complex problems to reduce mental strain."], tip:"Critical thinking = question everything (even authority), evaluate evidence, think independently." },
  { id:40, multi:true, q:"Which of the following strategies can help verify the accuracy of text generated by language models using the fact checklist pattern?", correct:["Reviewing the context in which each fact is presented","Cross-referencing generated facts with trusted sources","Checking for factual consistency across multiple parts of the text"], wrong:["Assessing the text for creative storytelling techniques","Evaluating the emotional impact of the generated text"], tip:"Fact checking = context review + cross-reference + internal consistency. Creative quality and emotion are irrelevant." },
  { id:41, multi:true, q:"Select the types of evidence that are generally accepted in academic writing to support claims.", correct:["Published meta-analyses","Results from controlled experiments","Statistical data from credible sources"], wrong:["Unverified online comments","Self-published books","Opinions of industry leaders"], tip:"Academic evidence = peer-reviewed, controlled, statistically grounded. Not anecdote, self-published, or unverified." },
  { id:42, multi:false, q:"How can creativity be fostered through brainstorming sessions?", correct:["Encouraging free flow of ideas without judgment"], wrong:["Having a structured agenda with strict time limits","Focusing on the most popular ideas only","Limiting the number of ideas to a manageable list"], tip:"Rule #1 of brainstorming: defer judgment. All ideas welcome. Evaluation comes later." },
  { id:43, multi:true, q:"Select the argument structures that are commonly used in university assignments to support complex ideas.", correct:["Comparison and contrast structure, examining similarities and differences between key concepts.","Problem-solution structure, where a specific problem is identified and viable solutions are proposed.","Introduction followed by a literature review, methodology, results, discussion, and conclusion."], wrong:["Stream of consciousness writing, expressing thoughts as they occur in an unstructured form.","Simple chronological order to narrate events without analytical commentary."], tip:"Academic structures = comparison/contrast, problem-solution, IMRaD. Stream of consciousness and plain narration lack analytical structure." },
  { id:44, multi:true, q:"Select the scenarios where prompt engineering can significantly improve the performance of large language models like ChatGPT.", correct:["Improving model responses in a customer service chatbot.","Generating creative writing pieces.","Extracting specific information from a dataset."], wrong:["Reducing computational costs of model execution.","Increasing the memory capacity of large language models."], tip:"Prompt engineering affects OUTPUTS, not hardware. It doesn't change compute costs or memory capacity." },
  { id:45, multi:false, q:"What is one effective strategy for comprehending complex academic texts?", correct:["Summarizing the main points after each section"], wrong:["Reading the text as quickly as possible","Only focusing on the introduction and conclusion","Skipping unfamiliar words"], tip:"Pausing to summarize forces active processing — it consolidates understanding section by section." },
  { id:46, multi:false, q:"What is the primary goal of applying the Question Refinement Pattern when interacting with large language models?", correct:["To improve the clarity and focus of questions for better model responses."], wrong:["To make questions more complex and challenging for the model.","To increase the length of questions to gather more information.","To eliminate any possibility of incorrect answers from the model."], tip:"Question Refinement = ask better questions → get better answers. Clarity and focus over length and complexity." },
  { id:47, multi:true, q:"Which of the following features are important for successfully implementing the outline expansion pattern?", correct:["Clear identification of main topics and subtopics.","Logical sequencing of sections.","Adequate research to support each section."], wrong:["Using only bullet points for subtopics.","Removing unnecessary headings and subheadings."], tip:"Outline expansion needs structure (clear topics, logical order) and substance (research per section)." },
  { id:48, multi:true, q:"Which of the following strategies are effective when experimenting with prompts in large language models to achieve specific tasks?", correct:["Incorporating feedback from model outputs","Testing prompts across multiple model variants","Iteratively refining prompt wording"], wrong:["Avoiding specific examples in prompts","Using a single prompt format for all tasks"], tip:"Prompt experimentation = feedback loops + testing variants + iterative wording. One-size-fits-all prompts fail." },
  { id:49, multi:false, q:"In the context of using the persona pattern with ChatGPT, which of the following best describes how personas can enhance the interaction?", correct:["Personas add context to the conversation, guiding ChatGPT's responses to align with specific roles or characters."], wrong:["Personas are used to manage user authentication and control access to ChatGPT.","Personas restrict ChatGPT's capabilities by limiting its responses to predefined scripts.","Personas enable ChatGPT to process mathematical expressions more efficiently."], tip:"A persona (e.g. 'Act as a doctor') provides role context that shapes the model's tone, knowledge focus, and style." },
  { id:50, multi:false, q:"Reflective writing is a key component of demonstrating critical thinking. Which of the following statements best illustrates reflective writing that shows critical thinking?", correct:["Analyzing past experiences to understand how they influenced current perspectives"], wrong:["Expressing thoughts on a topic without considering opposing views","Listing personal feelings without connecting them to broader concepts","Describing events in chronological order without interpretation"], tip:"Reflection + critical thinking = connect experience to insight + consider how it shaped your views." },
  { id:51, multi:false, q:"Evaluate the effectiveness of large language models in grading each other's outputs by identifying which factor most significantly impacts their grading accuracy.", correct:["Training data diversity"], wrong:["Model size","Inference speed","Hyperparameter tuning"], tip:"Diverse training data means the model has seen more grading contexts and styles — directly impacting its evaluation quality." },
  { id:52, multi:true, q:"Which strategies can enhance the effectiveness of prompts for large language models? Select all that apply.", correct:["Using clear instructions","Defining the context clearly","Specifying output format"], wrong:["Ambiguous phrasing","Overloading with information"], tip:"Clear + contextual + formatted = effective prompts. Ambiguity and information overload confuse models." },
  { id:53, multi:true, q:"Identify the common mistakes that can lead to faulty reasoning.", correct:["Appeal to emotion","Overgeneralization","Circular reasoning","Confirmation bias","Red herring"], wrong:["Occam's razor"], tip:"Occam's razor (prefer simplest explanation) is a HELPFUL reasoning principle, not a fallacy. All others are fallacies." },
  { id:54, multi:false, q:"Which of the following assumptions might weaken an argument if overlooked when discussing biases in media reporting?", correct:["Assuming all sources are unbiased and factual"], wrong:["Assuming media outlets always aim for profit maximization","Assuming media audiences have diverse perspectives","Assuming all journalists follow ethical guidelines"], tip:"If you assume no bias exists, you overlook the core issue. This assumption directly undermines the argument about media bias." },
  { id:55, multi:true, q:"In facing a new creative challenge, which strategies could enhance your problem-solving abilities?", correct:["Collaborating with diverse teams","Engaging in divergent thinking","Embracing failure as a learning opportunity"], wrong:["Limiting options to avoid confusion","Adhering to strict guidelines"], tip:"Creativity in problem-solving = diverse input + expansive thinking + learning from failure." },
  { id:56, multi:true, q:"Select the true statements about convergent thinking.", correct:["Convergent thinking is often used in problem-solving scenarios requiring a specific answer.","Convergent thinking involves narrowing down multiple ideas to find the best solution."], wrong:["Convergent thinking generates diverse and innovative ideas.","Convergent thinking encourages open-ended exploration of ideas."], tip:"Convergent = funnel many ideas to ONE best answer. Divergent = open up many possibilities." },
  { id:57, multi:true, q:"Select the dispositions that contribute to developing critical thinking skills at university.", correct:["Intellectual humility","Curiosity","Skepticism"], wrong:["Conformity","Impatience"], tip:"Critical thinkers are curious, humble about their knowledge, and appropriately skeptical — not conformist or rushed." },
  { id:58, multi:true, q:"Select the statements that effectively implement the Format of the Question Refinement Pattern in a learning module.", correct:["Craft questions that progressively increase in difficulty.","Integrate contextual scenarios that require application of learned concepts.","Provide immediate feedback to challenges, enhancing learning retention."], wrong:["Avoid using real-world examples to prevent distraction.","Include ambiguous questions to increase cognitive load."], tip:"Good learning questions = progressive difficulty + real-world context + immediate feedback." },
  { id:59, multi:false, q:"Lateral thinking often involves approaching a problem from different angles. Which of the following strategies best exemplifies lateral thinking when faced with a complex issue?", correct:["Considering unconventional solutions that are not immediately obvious"], wrong:["Following a systematic approach to solve the problem step-by-step","Relying on past experiences to address similar issues","Gathering more data to understand the problem better"], tip:"Lateral thinking = de Bono's method. It deliberately seeks non-obvious, indirect, creative angles." },
  { id:60, multi:false, q:"What is the primary benefit of using the Audience Persona Pattern to structure prompts effectively?", correct:["Enhances relevance by catering to specific user needs"], wrong:["Increases visual appeal of prompts","Improves grammatical accuracy","Facilitates prompt automation"], tip:"Audience Persona = tailor the response to a specific reader (beginner, expert, child, etc.) for maximum relevance." },
  { id:61, multi:true, q:"Select the reasons why change is significant for learners in higher education.", correct:["Enhancing adaptability to various academic challenges.","Developing critical thinking skills through diverse experiences."], wrong:["Maintaining a fixed mindset about academic subjects.","Change minimizes the need for self-driven learning.","Ensuring that learning is always predictable."], tip:"Change builds adaptability and diverse thinking. Fixed mindsets and predictable learning are the opposite of growth." },
  { id:62, multi:false, q:"What is the primary purpose of applying the persona pattern to language models in AI?", correct:["To simulate specific behaviors and attributes"], wrong:["To simplify the model architecture","To enhance security features","To increase the speed of language processing"], tip:"Persona pattern makes the model act like a specific character/expert — simulating behaviors and response styles." },
  { id:63, multi:false, q:"What is the primary function of root prompts in language model interactions?", correct:["To set the initial context and guide model responses"], wrong:["To exclusively generate random outputs","To ensure model responses are always factual","To bypass all ethical guidelines in model behavior"], tip:"Root prompts are the foundational/system prompt that sets the entire context for subsequent interactions." },
  { id:64, multi:true, q:"Which of the following are important considerations when testing prompts with large language models?", correct:["Checking the relevance of generated content","Assessing the diversity of the model's outputs","Evaluating the model's ability to follow instructions"], wrong:["Focusing exclusively on grammar and spelling","Ensuring the model only generates short responses"], tip:"Test for relevance + diversity + instruction-following. Grammar/length are secondary concerns." },
  { id:65, multi:true, q:"Identify the elements that are essential to consider when developing a plan for creativity development.", correct:["Setting clear creative goals","Incorporating regular brainstorming sessions","Building a supportive environment"], wrong:["Focusing primarily on competition","Ensuring adherence to strict guidelines"], tip:"Creativity development plan = clear goals + brainstorming habit + supportive culture. Competition and rigid guidelines block it." },
  { id:66, multi:true, q:"Which actions would contribute to 'critical thinking to understand and change social and political contexts'? Select all that apply.", correct:["Researching historical social movements and their impacts","Engaging in discussions with a diverse group of people","Analyzing policy documents and legislation"], wrong:["Ignoring media reports that contradict personal beliefs","Focusing solely on personal experiences without considering others"], tip:"Social critical thinking = historical research + diverse dialogue + policy analysis. Confirmation bias and insularity are harmful." },
  { id:67, multi:false, q:"What is the primary advantage of using few-shot examples in sentiment analysis and decision-making processes?", correct:["Enhances model adaptability with minimal data"], wrong:["Reduces computational complexity significantly","Improves model accuracy by using large datasets","Eliminates the need for labeled datasets"], tip:"Few-shot = learn from very few examples. Adapts quickly without needing large datasets or retraining." },
  { id:68, multi:false, q:"What is the first step in setting up and using ChatGPT for practical applications?", correct:["Create an OpenAI account to access ChatGPT."], wrong:["Select a ChatGPT model before creating an account.","Download the ChatGPT application from the OpenAI website.","Log in to ChatGPT using your Google account credentials."], tip:"You need an OpenAI account before anything else — model selection comes after login." },
  { id:69, multi:true, q:"Select the elements that could contribute to a successful recreation of childhood creativity.", correct:["Incorporating imaginative storytelling","Allowing exploration without limitations","Encouraging curiosity-driven projects"], wrong:["Insisting on perfection in every task","Restricting use of unfamiliar tools"], tip:"Childhood creativity = imagination + free exploration + curiosity. Perfectionism and restriction kill it." },
  { id:70, multi:false, q:"When prompting a language model to generate a list of items, which technique helps ensure that the model understands the contextual requirement for creativity in its response?", correct:["Explicitly state the expectation for creativity in the prompt."], wrong:["Limit the number of items requested to ensure creativity.","Use complex mathematical expressions in the prompt.","Include multiple examples of creative outputs within the prompt."], tip:"Be explicit: 'Generate a creative list of...' — don't assume the model will infer you want creative output." },
  { id:71, multi:false, q:"In evaluating peer assignments, what is a crucial aspect to consider when providing constructive feedback?", correct:["Specific and actionable advice"], wrong:["Length of the feedback","Focus only on positives","General observations"], tip:"Constructive feedback must be specific ('on page 3, this argument lacks evidence') and actionable (what to improve)." },
  { id:72, multi:true, q:"Select the approaches that are effective for enhancing problem-solving capabilities in language models.", correct:["Data augmentation","Fine-tuning","Transfer learning"], wrong:["Ignoring model biases","Random initialization","Reducing dataset size"], tip:"Data augmentation + fine-tuning + transfer learning all strengthen model capabilities. Ignoring bias and reducing data are harmful." },
  { id:73, multi:true, q:"Select all strategies that contribute to developing a creativity and innovation mindset.", correct:["Encouraging continuous learning and curiosity","Promoting a culture of experimentation and risk-taking","Fostering collaboration among diverse teams"], wrong:["Discouraging failure and mistakes","Prioritizing conformity to group norms"], tip:"Innovation mindset = learning + risk tolerance + diverse collaboration. Fear of failure and conformity stifle innovation." },
  { id:74, multi:false, q:"How does ReAct prompting enhance the ability of language models to interact with external tools and data sources?", correct:["By structuring interactions that integrate reasoning with actions."], wrong:["By eliminating the need for external tools.","By reducing the complexity of natural language processing.","By solely focusing on language comprehension."], tip:"ReAct = Reason + Act. The model reasons about what to do, then takes an action (tool call), then reasons on the result." },
  { id:75, multi:false, q:"Identify the sphere to which the following argument belongs: \"The new tax policy will significantly impact local businesses and should be reconsidered by the city council.\"", correct:["Public sphere"], wrong:["Personal sphere","Technical sphere","Intellectual sphere"], tip:"The public sphere = civic/political discourse, government policy, community concerns. This is a policy argument to civic authorities." },
  { id:76, multi:true, q:"Select all statements that correctly apply to few-shot prompting in the context of large language models.", correct:["It helps the model learn to follow specific patterns with minimal examples","It can reduce the amount of data needed for training"], wrong:["It is always more effective than zero-shot prompting","It involves completely retraining the model from scratch","It eliminates the need for any kind of pre-training"], tip:"Few-shot = patterns from examples, data-efficient. NOT always better than zero-shot (depends on task), and doesn't retrain the model." },
  { id:77, multi:false, q:"Which approach is most effective for developing premises that lead to robust conclusions in university assignments?", correct:["Critical analysis of evidence"], wrong:["Summarizing existing literature only","Relying solely on personal experiences","Ignoring conflicting viewpoints"], tip:"Robust conclusions require critically interrogating evidence — not summarizing, not personal anecdote, not ignoring counterarguments." },
  { id:78, multi:true, q:"Select the activities that are commonly used to enhance creativity in individuals.", correct:["Brainstorming","Doodling","Engaging in role-playing exercises"], wrong:["Conforming to strict rules","Following a detailed schedule"], tip:"Brainstorming, doodling (visual thinking), and role-play (perspective-taking) all stimulate creative cognition." },
  { id:79, multi:true, q:"Which of the following are strategies to enhance creativity in problem-solving?", correct:["Embracing unusual ideas","Brainstorming with a diverse group","Experimenting with prototypes"], wrong:["Avoiding collaborative efforts","Strictly following traditional methods"], tip:"Creative problem-solving = accept wild ideas + diverse input + build and test (prototyping)." },
  { id:80, multi:false, q:"When adapting explanations of large language models (LLMs) to different audiences using the Audience Persona Pattern, which of the following strategies is most effective for engaging a technical audience?", correct:["Use detailed technical jargon and emphasize the underlying algorithms."], wrong:["Use simple analogies to explain complex concepts.","Focus solely on the potential societal impacts of LLMs.","Highlight the historical development of LLMs without technical details."], tip:"Technical audiences want depth and precision — algorithms, architectures, and technical vocabulary are expected and valued." },
  { id:81, multi:false, q:"Which of the following statements best represents a logical fallacy known as \"ad hominem\"?", correct:["Attacking the character of the opponent rather than addressing their argument."], wrong:["Drawing a conclusion based on a small sample size.","Arguing that a claim is true because it has not been proven false.","Presenting two options as the only possibilities when more exist."], tip:"Ad hominem = 'against the person'. Attack the arguer, not the argument. (Others: hasty generalization, appeal to ignorance, false dilemma)" },
  { id:82, multi:true, q:"Select all statements that accurately describe convergent thinking.", correct:["Convergent thinking is essential for problem-solving where accuracy is crucial.","Convergent thinking involves narrowing down multiple ideas to find the best solution.","It often involves logical reasoning and analysis."], wrong:["It encourages the generation of creative ideas without immediate judgment.","It prioritizes quantity over quality in ideas."], tip:"Convergent = systematic, logical narrowing to the single best answer. Quantity-without-judgment and free generation = divergent." },
  { id:83, multi:false, q:"Which prompt pattern is most effective for generating specific types of content using large language models?", correct:["Chain of Thought Prompting"], wrong:["Multi-task Prompting","Random Prompt Pattern","Single Word Prompting"], tip:"Chain of Thought guides the model through structured reasoning steps to produce specific, well-reasoned content." },
  { id:84, multi:false, q:"Which menu action can be used in a software application to quickly sort a list of tasks by priority, enhancing organizational efficiency?", correct:["Sort tasks by priority."], wrong:["Export tasks to a spreadsheet.","Schedule tasks in the calendar.","Filter tasks by creation date."], tip:"Directly: the sort-by-priority action achieves priority-based organization. The others serve different purposes." },
  { id:85, multi:true, q:"Identify the skills and habits of mind that enhance critical thinking.", correct:["Self-regulation","Problem-solving","Open-mindedness"], wrong:["Passivity","Stubbornness"], tip:"Critical thinking requires active self-regulation, purposeful problem-solving, and openness to being wrong." },
  { id:86, multi:false, q:"Which of the following approaches would most effectively help identify innovation opportunities within a company?", correct:["Conducting regular brainstorming sessions with diverse teams"], wrong:["Focusing solely on competitor analysis","Implementing strict hierarchical decision-making processes","Centralizing all research and development activities"], tip:"Innovation emerges from diverse perspectives in open dialogue — not from hierarchy or competitive mimicry." },
  { id:87, multi:true, q:"When testing different patterns in prompt engineering for improving language models like ChatGPT, which of the following techniques are effective?", correct:["Using varied question types to test model comprehension","Incorporating user feedback into prompt design","Iteratively refining prompts based on model feedback"], wrong:["Ignoring context to focus solely on model output","Relying on randomness to generate prompts"], tip:"Systematic testing = variety + feedback loops + iteration. Randomness and context-ignorance produce unreliable results." },
  { id:88, multi:true, q:"Which of the following are effective strategies for incorporating intermediate steps in few-shot examples to enhance problem-solving skills?", correct:["Using visual aids to illustrate intermediate steps and processes.","Encouraging questioning and exploration during each step.","Breaking down complex problems into smaller, manageable tasks."], wrong:["Increasing the complexity of each step to challenge learners.","Skipping unnecessary steps to speed up the solution process."], tip:"Intermediate steps = visualize + encourage questions + break down. Don't inflate complexity or skip steps." },
  { id:89, multi:false, q:"Which activity is most likely to enhance creativity in one's everyday environment?", correct:["Participating in community art projects"], wrong:["Avoiding all forms of media","Following a strict daily routine","Focusing solely on logical problem-solving"], tip:"Art projects engage creative muscles, expose you to other perspectives, and involve collaborative making." },
  { id:90, multi:false, q:"Which aspect is crucial when developing a shorthand notation to communicate with large language models?", correct:["Consistency in notation"], wrong:["Lengthiness in notation","Complexity in notation","Ambiguity in notation"], tip:"Shorthand only works if you use it consistently — the model (and you) must reliably know what each symbol means." },
  { id:91, multi:true, q:"Select the game play patterns that can enhance creativity in generating new content through prompt engineering.", correct:["Puzzle-solving tasks","Collaborative story-building"], wrong:["Strict rule-following games","Time-constrained quizzes","Leaderboard competitions"], tip:"Puzzle-solving (open-ended creative problem) and collaborative story-building directly generate creative content. Rules/time/competition create pressure, not creativity." },
  { id:92, multi:true, q:"In what ways can ChatGPT assist a speech pathologist in refining therapy techniques?", correct:["By offering insights into communication strategies","By providing sample dialogues for role-playing scenarios","By suggesting new therapy exercises based on recent research"], wrong:["By diagnosing speech disorders","By physically demonstrating speech exercises"], tip:"ChatGPT can inform, suggest, and provide material — but cannot diagnose medical conditions or have a physical body." },
  { id:93, multi:false, q:"In the context of implementing the Format of the Cognitive Verifier Pattern, what is the primary purpose of using decision tables?", correct:["To systematically represent complex logical relationships."], wrong:["To visualize data trends over time.","To store large datasets securely.","To perform arithmetic operations efficiently."], tip:"Decision tables map conditions to outcomes in a structured grid — perfect for representing complex IF-THEN logical relationships." },
  { id:94, multi:false, q:"In the context of the Cognitive Verifier Pattern, what is the primary goal when implementing this pattern in large language models?", correct:["Enhance reasoning capabilities to generate more accurate answers"], wrong:["Reduce the training data required for large language models","Increase model complexity to improve computational efficiency","Simplify language model architecture to improve understanding"], tip:"Cognitive Verifier = ask the model to verify/double-check its reasoning \u2192 enhances accuracy of the final answer." },
  { id:95, multi:true, q:"Select the valid CSS properties used for styling text.", correct:["text-align","font-weight","line-height"], wrong:["background-color","display"], tip:"text-align, font-weight, and line-height directly style text. background-color is background styling; display is layout." },
  { id:96, multi:true, q:"Which of the following techniques can be used to apply semantic filters for altering or excluding information from text based on meaning and context? Select all that apply.", correct:["Named Entity Recognition (NER) to identify and categorize key entities","Sentiment Analysis to assess the emotional tone","Topic Modeling to uncover hidden thematic structures"], wrong:["Text file compression to reduce file size","Grammar correction to improve text accuracy"], tip:"NER, Sentiment Analysis, and Topic Modeling operate on meaning/semantics. Compression and grammar correction are syntax/structure operations." },
  { id:97, multi:true, q:"Which of the following statements accurately describe similarities between creativity and biological evolution?", correct:["Both involve a trial-and-error process.","Both can lead to unexpected results.","Both are constrained by environmental factors."], wrong:["Both follow a predetermined plan.","Both are driven by the need for survival."], tip:"Evolution and creativity: no predetermined plan, iterative trial-and-error, shaped by environment, and produce surprising results. Creativity isn't about survival." }
];

// ── State ──────────────────────────────────────────────────────────────────
const MEM_KEY = 'ct_memory_v1';
let memory = JSON.parse(localStorage.getItem(MEM_KEY) || '{}');

let deck = [...CARDS];
let current = 0;
let isAnswered = false;
let currentOptions = [];   // shuffled {text, correct}
let sessionResults = {};   // {id: bool}
let currentFilter = 'all';

// ── Persistence ────────────────────────────────────────────────────────────
function saveMemory() { localStorage.setItem(MEM_KEY, JSON.stringify(memory)); }

// ── Helpers ────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderCard() {
  const card = deck[current];
  isAnswered = false;

  // Shuffle options
  currentOptions = shuffle([
    ...card.correct.map(t => ({ text: t, correct: true })),
    ...card.wrong.map(t => ({ text: t, correct: false }))
  ]);

  // Meta
  const mem = memory[card.id];
  document.getElementById('cardMeta').innerHTML =
    `Question <span class="card-num">#${card.id}</span>` +
    (card.multi ? ' <span class="multi-badge">SELECT ALL</span>' : '');

  const mb = document.getElementById('memBadge');
  mb.innerHTML = mem
    ? `<span class="mem-badge ${mem}">${mem === 'hard' ? '&#128308; Hard' : '&#128994; Easy'}</span>`
    : '';

  // Question
  document.getElementById('questionText').textContent = card.q;

  // Options
  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  currentOptions.forEach((opt, i) => {
    const lbl = document.createElement('label');
    lbl.className = 'option-item';
    lbl.innerHTML =
      `<input type="${card.multi ? 'checkbox' : 'radio'}" name="opt" value="${i}">` +
      `<span class="opt-text">${opt.text}</span>`;
    lbl.addEventListener('change', syncSelectedStyles);
    list.appendChild(lbl);
  });

  // Reset submit button
  const btn = document.getElementById('btnSubmit');
  btn.textContent = 'Submit Answer';
  btn.className = 'btn-submit';

  // Show question side, hide results
  document.getElementById('questionSide').style.display = '';
  const ra = document.getElementById('resultsArea');
  ra.classList.remove('visible');
  ra.style.display = '';

  // Hide memory row
  document.getElementById('memRow').classList.add('hidden');

  updateProgress();
  updateNav();
}

function syncSelectedStyles() {
  document.querySelectorAll('.option-item').forEach(lbl => {
    lbl.classList.toggle('selected', lbl.querySelector('input').checked);
  });
}

// ── Submit ─────────────────────────────────────────────────────────────────
function submitAnswer() {
  const checked = [...document.querySelectorAll('.option-item input:checked')];
  if (checked.length === 0) {
    const btn = document.getElementById('btnSubmit');
    btn.textContent = 'Please select at least one answer!';
    btn.className = 'btn-submit warn';
    return;
  }

  const card = deck[current];
  isAnswered = true;

  const selectedTexts = new Set(checked.map(inp => currentOptions[parseInt(inp.value)].text));
  const correctTexts = new Set(card.correct);

  // Evaluate correctness
  let allCorrectPicked = true;
  for (const c of correctTexts) { if (!selectedTexts.has(c)) { allCorrectPicked = false; break; } }
  let noWrongPicked = true;
  for (const s of selectedTexts) { if (!correctTexts.has(s)) { noWrongPicked = false; break; } }
  const isFullyCorrect = allCorrectPicked && noWrongPicked;

  let correctHits = 0;
  for (const s of selectedTexts) { if (correctTexts.has(s)) correctHits++; }
  const isPartial = !isFullyCorrect && correctHits > 0 && card.multi;

  sessionResults[card.id] = isFullyCorrect;

  // Hide question side
  document.getElementById('questionSide').style.display = 'none';

  // Result banner
  const banner = document.getElementById('resultBanner');
  if (isFullyCorrect) {
    banner.className = 'result-banner r-correct';
    banner.textContent = '\u2713 Correct!';
  } else if (isPartial) {
    banner.className = 'result-banner r-partial';
    banner.textContent = `\u26a1 Partial \u2014 ${correctHits} of ${correctTexts.size} correct options selected`;
  } else {
    banner.className = 'result-banner r-wrong';
    banner.textContent = '\u2717 Incorrect';
  }

  // Result options
  const ro = document.getElementById('resultOpts');
  ro.innerHTML = '';
  currentOptions.forEach(opt => {
    const picked = selectedTexts.has(opt.text);
    let cls, icon;
    if (opt.correct && picked)       { cls = 'ro-correct-hit'; icon = '\u2713'; }
    else if (opt.correct && !picked) { cls = 'ro-correct-miss'; icon = '\u25cb'; }
    else if (!opt.correct && picked) { cls = 'ro-wrong-hit'; icon = '\u2717'; }
    else                             { cls = 'ro-wrong-miss'; icon = '\u00b7'; }
    const d = document.createElement('div');
    d.className = `result-opt ${cls}`;
    d.innerHTML = `<i class="ri">${icon}</i><span class="ro-text">${opt.text}</span>`;
    ro.appendChild(d);
  });

  // Tip
  const tip = document.getElementById('tipBox');
  if (card.tip) { tip.textContent = '\ud83d\udca1 ' + card.tip; tip.style.display = ''; }
  else { tip.style.display = 'none'; }

  document.getElementById('resultsArea').classList.add('visible');

  // Show memory buttons and highlight current state
  document.getElementById('memRow').classList.remove('hidden');
  refreshMemBtns(card.id);

  updateScoreDisplay();
  updateNav();
}

// ── Memory ─────────────────────────────────────────────────────────────────
function setMemory(level) {
  const card = deck[current];
  // Toggle off if same level clicked again
  if (memory[card.id] === level) {
    delete memory[card.id];
  } else {
    memory[card.id] = level;
  }
  saveMemory();
  refreshMemBtns(card.id);
  updateMemStats();
  updateFilterCounts();
  // Update badge on card header
  const mb = document.getElementById('memBadge');
  const mem = memory[card.id];
  mb.innerHTML = mem
    ? `<span class="mem-badge ${mem}">${mem === 'hard' ? '&#128308; Hard' : '&#128994; Easy'}</span>`
    : '';

  // Auto-advance after short delay
  setTimeout(() => {
    if (current < deck.length - 1) nextCard();
    else showSummary();
  }, 350);
}

function refreshMemBtns(cardId) {
  const m = memory[cardId];
  document.getElementById('btnHard').classList.toggle('active', m === 'hard');
  document.getElementById('btnEasy').classList.toggle('active', m === 'easy');
}

// ── Navigation ─────────────────────────────────────────────────────────────
function nextCard() {
  if (current < deck.length - 1) { current++; renderCard(); }
  else if (isAnswered) showSummary();
}

function prevCard() {
  if (current > 0) { current--; renderCard(); }
}

// ── Progress & Stats ───────────────────────────────────────────────────────
function updateProgress() {
  const pct = ((current + 1) / deck.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  const label = currentFilter !== 'all' ? ` \u2022 ${currentFilter}` : '';
  document.getElementById('counter').textContent =
    `Card ${current + 1} of ${deck.length}${label}`;
}

function updateNav() {
  document.getElementById('btnPrev').disabled = current === 0;
  const isLast = current === deck.length - 1;
  const nextBtn = document.getElementById('btnNext');
  if (isLast && isAnswered) {
    nextBtn.textContent = 'Finish \u2192';
    nextBtn.onclick = showSummary;
  } else {
    nextBtn.textContent = 'Next \u2192';
    nextBtn.onclick = nextCard;
  }
  nextBtn.disabled = false;
}

function updateScoreDisplay() {
  const c = Object.values(sessionResults).filter(Boolean).length;
  const w = Object.values(sessionResults).filter(v => !v).length;
  document.getElementById('correctCount').textContent = '\u2713 ' + c;
  document.getElementById('incorrectCount').textContent = '\u2717 ' + w;
}

function updateMemStats() {
  const h = Object.values(memory).filter(v => v === 'hard').length;
  const e = Object.values(memory).filter(v => v === 'easy').length;
  document.getElementById('hardCount').textContent = '\ud83d\udd34 Hard: ' + h;
  document.getElementById('easyCount').textContent = '\ud83d\udfe2 Easy: ' + e;
}

function updateFilterCounts() {
  const h = Object.values(memory).filter(v => v === 'hard').length;
  const e = Object.values(memory).filter(v => v === 'easy').length;
  const n = CARDS.filter(c => !memory[c.id]).length;
  document.getElementById('fAll').textContent = `All (${CARDS.length})`;
  document.getElementById('fHard').textContent = `\ud83d\udd34 Hard (${h})`;
  document.getElementById('fEasy').textContent = `\ud83d\udfe2 Easy (${e})`;
  document.getElementById('fNew').textContent = `New (${n})`;
}

// ── Filters ────────────────────────────────────────────────────────────────
function setFilter(filter) {
  let filtered;
  if (filter === 'all')  filtered = [...CARDS];
  else if (filter === 'hard') filtered = CARDS.filter(c => memory[c.id] === 'hard');
  else if (filter === 'easy') filtered = CARDS.filter(c => memory[c.id] === 'easy');
  else if (filter === 'new')  filtered = CARDS.filter(c => !memory[c.id]);

  if (filtered.length === 0) {
    alert('No cards in this category yet!');
    return;
  }

  currentFilter = filter;
  deck = filtered;
  current = 0;
  sessionResults = {};
  updateScoreDisplay();
  updateFilterCounts();

  ['fAll','fHard','fEasy','fNew'].forEach(id => document.getElementById(id).classList.remove('active'));
  const map = { all:'fAll', hard:'fHard', easy:'fEasy', new:'fNew' };
  document.getElementById(map[filter]).classList.add('active');

  renderCard();
}

function shuffleDeck() {
  deck = shuffle(deck);
  current = 0;
  sessionResults = {};
  updateScoreDisplay();
  renderCard();
}

function resetAll() {
  deck = [...CARDS];
  current = 0;
  sessionResults = {};
  currentFilter = 'all';
  updateScoreDisplay();
  updateFilterCounts();
  ['fAll','fHard','fEasy','fNew'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('fAll').classList.add('active');
  document.getElementById('summary').style.display = 'none';
  document.getElementById('cardArea').style.display = '';
  document.getElementById('navRow').style.display = '';
  document.getElementById('toolbar').style.display = '';
  document.getElementById('kbHint').style.display = '';
  renderCard();
}

// ── Summary ────────────────────────────────────────────────────────────────
function showSummary() {
  const correct = Object.values(sessionResults).filter(Boolean).length;
  const total = Object.keys(sessionResults).length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const h = Object.values(memory).filter(v => v === 'hard').length;
  const e = Object.values(memory).filter(v => v === 'easy').length;

  document.getElementById('cardArea').style.display = 'none';
  document.getElementById('navRow').style.display = 'none';
  document.getElementById('memRow').classList.add('hidden');
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('kbHint').style.display = 'none';

  const score = document.getElementById('sumScore');
  score.textContent = pct + '%';
  score.style.color = pct >= 70 ? 'var(--accent2)' : pct >= 50 ? 'var(--tip)' : 'var(--wrong)';
  document.getElementById('sumSub').textContent = `${correct} / ${total} questions correct`;
  document.getElementById('sumHard').textContent = '\ud83d\udd34 Hard: ' + h;
  document.getElementById('sumEasy').textContent = '\ud83d\udfe2 Easy: ' + e;
  document.getElementById('summary').style.display = 'flex';
}

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Enter' && !isAnswered) { e.preventDefault(); submitAnswer(); }
  if (e.code === 'ArrowRight') nextCard();
  if (e.code === 'ArrowLeft') prevCard();
  if (e.code === 'KeyH' && isAnswered) setMemory('hard');
  if (e.code === 'KeyE' && isAnswered) setMemory('easy');
});

// ── Init ───────────────────────────────────────────────────────────────────
updateMemStats();
updateFilterCounts();
renderCard();
</script>
</body>
</html>
