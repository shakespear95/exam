<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Critical Thinking Flashcards</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --card-front: #1e2030;
    --card-back: #1a2640;
    --accent: #6c8ef5;
    --accent2: #4ade80;
    --wrong: #f87171;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #2d3148;
    --tip: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; }

  header { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 16px; }
  h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase; }

  .progress-wrap { width: 100%; background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; }

  .counter { font-size: 0.85rem; color: var(--muted); }

  .score-row { display: flex; gap: 16px; font-size: 0.8rem; }
  .score-item { padding: 3px 10px; border-radius: 99px; font-weight: 600; }
  .score-item.known { background: rgba(74,222,128,0.15); color: var(--accent2); }
  .score-item.unknown { background: rgba(248,113,113,0.15); color: var(--wrong); }

  /* Card */
  .card-area { width: 100%; max-width: 600px; perspective: 1200px; flex: 1; display: flex; flex-direction: column; align-items: center; }

  .card { width: 100%; min-height: 300px; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(.4,0,.2,1); cursor: pointer; }
  .card.flipped { transform: rotateY(180deg); }

  .card-face { position: absolute; width: 100%; min-height: 300px; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 18px; padding: 24px; display: flex; flex-direction: column; gap: 12px; }

  .card-front { background: var(--card-front); border: 1px solid var(--border); }
  .card-back { background: var(--card-back); border: 1px solid rgba(108,142,245,0.3); transform: rotateY(180deg); }

  .card-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .card-label.answer-label { color: var(--accent2); }

  .card-num { font-size: 0.75rem; color: var(--accent); font-weight: 600; }
  .multi-badge { display: inline-block; font-size: 0.65rem; background: rgba(108,142,245,0.2); color: var(--accent); border-radius: 4px; padding: 2px 6px; margin-left: 6px; font-weight: 600; letter-spacing: 0.05em; }

  .question-text { font-size: 1rem; line-height: 1.6; font-weight: 500; flex: 1; }

  .tap-hint { margin-top: auto; font-size: 0.75rem; color: var(--muted); text-align: center; padding-top: 8px; }
  .tap-hint span { font-size: 1rem; }

  .answer-block { flex: 1; }
  .answer-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); line-height: 1.5; font-size: 0.92rem; }
  .answer-item:last-child { border-bottom: none; }
  .answer-item .check { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .answer-item.correct .check::before { content: "✓"; color: var(--accent2); font-weight: 700; }
  .answer-item.wrong-opt .check::before { content: "✗"; color: var(--wrong); }
  .answer-item .ans-text { }
  .answer-item.correct .ans-text { color: var(--accent2); font-weight: 600; }
  .answer-item.wrong-opt .ans-text { color: var(--wrong); text-decoration: line-through; opacity: 0.7; }

  .tip-box { margin-top: 10px; background: rgba(251,191,36,0.08); border-left: 3px solid var(--tip); border-radius: 0 8px 8px 0; padding: 8px 12px; font-size: 0.8rem; color: var(--tip); line-height: 1.5; }

  /* Spacer for card height */
  .card-spacer { min-height: 300px; pointer-events: none; opacity: 0; }

  /* Navigation */
  .nav { width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: space-between; margin-top: 20px; gap: 10px; }

  .btn { border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; padding: 12px 20px; transition: all 0.2s; }
  .btn:active { transform: scale(0.95); }

  .btn-nav { background: var(--surface); color: var(--text); border: 1px solid var(--border); flex: 1; }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-nav:not(:disabled):hover { background: var(--border); }

  .btn-flip { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: white; flex: 2; box-shadow: 0 4px 15px rgba(108,142,245,0.3); }
  .btn-flip:hover { box-shadow: 0 6px 20px rgba(108,142,245,0.4); }

  /* Self-grade buttons */
  .grade-row { width: 100%; max-width: 600px; display: flex; gap: 10px; margin-top: 10px; }
  .grade-row.hidden { visibility: hidden; }
  .btn-knew { background: rgba(74,222,128,0.15); color: var(--accent2); border: 1px solid rgba(74,222,128,0.3); flex: 1; }
  .btn-knew:hover { background: rgba(74,222,128,0.25); }
  .btn-forgot { background: rgba(248,113,113,0.15); color: var(--wrong); border: 1px solid rgba(248,113,113,0.3); flex: 1; }
  .btn-forgot:hover { background: rgba(248,113,113,0.25); }

  /* Shuffle / Reset */
  .toolbar { width: 100%; max-width: 600px; display: flex; gap: 8px; margin-top: 10px; }
  .btn-tool { background: var(--surface); color: var(--muted); border: 1px solid var(--border); font-size: 0.8rem; flex: 1; padding: 8px; }
  .btn-tool:hover { color: var(--text); border-color: var(--accent); }

  /* Summary */
  .summary { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 32px 20px; text-align: center; max-width: 600px; width: 100%; }
  .summary h2 { font-size: 1.5rem; color: var(--accent2); }
  .summary .big-score { font-size: 3rem; font-weight: 800; color: var(--text); }
  .summary .sub { color: var(--muted); }
  .btn-restart { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: white; padding: 14px 32px; border-radius: 14px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>Critical Thinking Flashcards</h1>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="counter" id="counter">Card 1 of 97</div>
  <div class="score-row">
    <div class="score-item known" id="knownCount">Knew: 0</div>
    <div class="score-item unknown" id="unknownCount">Missed: 0</div>
  </div>
</header>

<div class="card-area" id="cardArea">
  <div class="card" id="card" onclick="flipCard()">
    <div class="card-face card-front" id="cardFront"></div>
    <div class="card-face card-back" id="cardBack"></div>
  </div>
  <div class="card-spacer"></div>
</div>

<div class="nav">
  <button class="btn btn-nav" id="btnPrev" onclick="prevCard()">&#8592; Prev</button>
  <button class="btn btn-flip" onclick="flipCard()" id="btnFlip">Reveal Answer</button>
  <button class="btn btn-nav" id="btnNext" onclick="nextCard()">Next &#8594;</button>
</div>

<div class="grade-row hidden" id="gradeRow">
  <button class="btn btn-knew" onclick="grade(true)">&#10003; Knew it</button>
  <button class="btn btn-forgot" onclick="grade(false)">&#10007; Missed it</button>
</div>

<div class="toolbar">
  <button class="btn btn-tool" onclick="shuffleCards()">&#9646;&#9646; Shuffle</button>
  <button class="btn btn-tool" onclick="reviewMissed()">&#9888; Review Missed</button>
  <button class="btn btn-tool" onclick="resetAll()">&#8635; Reset</button>
</div>

<div class="summary" id="summary">
  <h2>Session Complete!</h2>
  <div class="big-score" id="summaryScore"></div>
  <div class="sub" id="summarySub"></div>
  <button class="btn-restart" onclick="resetAll()">Start Over</button>
</div>

// State
let deck = [...CARDS];
let current = 0;
let isFlipped = false;
let results = {}; // id -> true/false
let missedIds = new Set();

function renderCard() {
  const card = deck[current];
  const front = document.getElementById('cardFront');
  const back = document.getElementById('cardBack');
  const gradeRow = document.getElementById('gradeRow');

  // Reset flip
  document.getElementById('card').classList.remove('flipped');
  isFlipped = false;
  document.getElementById('btnFlip').textContent = 'Reveal Answer';
  gradeRow.classList.add('hidden');

  // Front
  front.innerHTML = `
    <div class="card-label">Question <span class="card-num">#${card.id}</span>${card.multi ? '<span class="multi-badge">SELECT ALL</span>' : ''}</div>
    <div class="question-text">${card.q}</div>
    <div class="tap-hint"><span>👆</span> Tap card or button to reveal</div>
  `;

  // Back — build answer list
  let answersHtml = '';
  const allOptions = [...card.correct, ...card.wrong];
  // Show correct answers only (clean view)
  card.correct.forEach(ans => {
    answersHtml += `<div class="answer-item correct"><span class="check"></span><span class="ans-text">${ans}</span></div>`;
  });
  if (card.wrong.length > 0 && card.correct.length < 3) {
    // Show some wrong ones for context
    card.wrong.slice(0, 2).forEach(ans => {
      answersHtml += `<div class="answer-item wrong-opt"><span class="check"></span><span class="ans-text">${ans}</span></div>`;
    });
  }

  back.innerHTML = `
    <div class="card-label answer-label">Answer <span class="card-num">#${card.id}</span></div>
    <div class="answer-block">${answersHtml}</div>
    ${card.tip ? `<div class="tip-box">&#128161; ${card.tip}</div>` : ''}
  `;

  updateProgress();
  updateNav();
}

function flipCard() {
  const card = document.getElementById('card');
  const gradeRow = document.getElementById('gradeRow');
  isFlipped = !isFlipped;
  if (isFlipped) {
    card.classList.add('flipped');
    document.getElementById('btnFlip').textContent = 'Flip Back';
    gradeRow.classList.remove('hidden');
  } else {
    card.classList.remove('flipped');
    document.getElementById('btnFlip').textContent = 'Reveal Answer';
    gradeRow.classList.add('hidden');
  }
}

function grade(knew) {
  const card = deck[current];
  results[card.id] = knew;
  if (!knew) missedIds.add(card.id);
  else missedIds.delete(card.id);
  updateScoreDisplay();

  // Auto-advance
  if (current < deck.length - 1) {
    nextCard();
  } else {
    showSummary();
  }
}

function nextCard() {
  if (current < deck.length - 1) {
    current++;
    renderCard();
  }
}

function prevCard() {
  if (current > 0) {
    current--;
    renderCard();
  }
}

function updateProgress() {
  const pct = ((current + 1) / deck.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('counter').textContent = `Card ${current + 1} of ${deck.length}`;
}

function updateNav() {
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === deck.length - 1;
}

function updateScoreDisplay() {
  const known = Object.values(results).filter(Boolean).length;
  const unknown = Object.values(results).filter(v => !v).length;
  document.getElementById('knownCount').textContent = `Knew: ${known}`;
  document.getElementById('unknownCount').textContent = `Missed: ${unknown}`;
}

function shuffleCards() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  renderCard();
}

function reviewMissed() {
  const missed = CARDS.filter(c => missedIds.has(c.id));
  if (missed.length === 0) {
    alert('No missed cards yet! Study some cards first.');
    return;
  }
  deck = [...missed];
  current = 0;
  renderCard();
}

function resetAll() {
  deck = [...CARDS];
  current = 0;
  results = {};
  missedIds = new Set();
  updateScoreDisplay();
  document.getElementById('summary').style.display = 'none';
  document.getElementById('cardArea').style.display = 'flex';
  document.querySelector('.nav').style.display = 'flex';
  document.getElementById('gradeRow').style.display = 'flex';
  document.querySelector('.toolbar').style.display = 'flex';
  renderCard();
}

function showSummary() {
  const known = Object.values(results).filter(Boolean).length;
  const total = Object.keys(results).length;
  const pct = total > 0 ? Math.round((known / total) * 100) : 0;

  document.getElementById('cardArea').style.display = 'none';
  document.querySelector('.nav').style.display = 'none';
  document.getElementById('gradeRow').style.display = 'none';
  document.querySelector('.toolbar').style.display = 'none';

  const s = document.getElementById('summary');
  document.getElementById('summaryScore').textContent = `${pct}%`;
  document.getElementById('summarySub').textContent = `${known} / ${total} cards correct`;
  s.style.display = 'flex';
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight') nextCard();
  if (e.code === 'ArrowLeft') prevCard();
  if (e.code === 'KeyY' && isFlipped) grade(true);
  if (e.code === 'KeyN' && isFlipped) grade(false);
});

// Swipe support
let touchStartX = 0;
document.getElementById('card').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive: true});
document.getElementById('card').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) nextCard();
    else prevCard();
  } else {
    flipCard();
  }
}, {passive: true});

// Init
renderCard();
</script>
</body>
</html>
